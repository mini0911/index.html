<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>電影欣賞社 - 互動點名系統</title>
    <style>
        :root { --primary: #2b4c7e; --success: #2e7d32; --danger: #c62828; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* 雙軌簽到區 */
        .manual-signin { background: white; padding: 20px; border-radius: 10px; border: 2px solid var(--primary); margin-bottom: 20px; text-align: center; }
        .input-group { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        input[type="text"] { padding: 10px; width: 250px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        .btn { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        th { background: #eee; }
        .chk-btn { width: 20px; height: 20px; cursor: pointer; }
        #status-bar { padding: 10px; background: #333; color: #fff; margin-bottom: 10px; border-radius: 5px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="status-bar">📡 系統初始化中...</div>
        
        <div class="manual-signin">
            <h3>教師手動補簽區</h3>
            <div class="input-group">
                <input type="text" id="manual-id" placeholder="輸入學號後按下簽到">
                <button class="btn" onclick="manualSignIn()">確認簽到</button>
            </div>
            <p id="msg" style="font-weight:bold; margin-top:10px;"></p>
        </div>

        <table id="rollcall-table">
            <thead>
                <tr><th>序號</th><th>學號</th><th>姓名</th><th>班級</th><th>07/16</th></tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        // 您的學生名單
        const students = [{"id": "11401011", "name": "李浩凱", "dept_class": "重機科一忠"}, {"id": "11401014", "name": "林士閎", "dept_class": "重機科一忠"}];
        let attendance = {}; 
        const today = "07/16";

        // 渲染表格
        function render() {
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            students.forEach((s, i) => {
                body.innerHTML += `<tr>
                    <td>${i+1}</td><td>${s.id}</td><td>${s.name}</td><td>${s.dept_class}</td>
                    <td><input type="checkbox" class="chk-btn" ${attendance[s.id] ? 'checked' : ''} onchange="toggle('${s.id}')"></td>
                </tr>`;
            });
        }

        // 手動勾選
        function toggle(id) {
            attendance[id] = !attendance[id];
        }

        // 手動簽到功能
        function manualSignIn() {
            const input = document.getElementById('manual-id');
            const id = input.value.trim();
            const s = students.find(x => x.id === id);
            if(s) {
                attendance[id] = true;
                document.getElementById('msg').innerText = `✅ 已手動補簽：${s.name}`;
                document.getElementById('msg').style.color = 'green';
                render();
            } else {
                document.getElementById('msg').innerText = "❌ 找不到該學號";
                document.getElementById('msg').style.color = 'red';
            }
            input.value = '';
        }

        // 自動同步雲端 (改用代理伺服器以突破學校連線封鎖)
        function syncCloud() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTq4fS-2mFLfh-Ev7PTr55WNVwUpEUfXmIhMnN3M6CGZEkBQ96u5Fke4_8U3UNIOBqAC2shIfAQfaOL/pub?output=csv";
            const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(url);
            
            fetch(proxy)
                .then(r => r.json())
                .then(data => {
                    const csvText = data.contents;
                    students.forEach(s => {
                        if(csvText.includes(s.id)) attendance[s.id] = true;
                    });
                    render();
                    document.getElementById('status-bar').innerText = "🟢 雲端已同步，掃碼與手動均可運作";
                })
                .catch(() => {
                    document.getElementById('status-bar').innerText = "⚠️ 雲端連線受限，請使用手動補簽功能";
                });
        }

        render();
        setInterval(syncCloud, 5000);
        syncCloud();
    </script>
</body>
</html>
