<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電影欣賞社 - 智慧點名中心</title>
    <style>
        :root { --primary: #2b4c7e; --success: #2e7d32; --danger: #c62828; --bg: #f8f9fa; }
        body { background-color: var(--bg); padding: 20px; font-family: sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; }
        .status-bar { padding: 10px; background: #333; color: #00ff00; border-radius: 5px; margin-bottom: 10px; font-size: 12px; }
        .manual-sign { background: white; padding: 20px; border-radius: 8px; border: 2px solid var(--primary); margin-bottom: 20px; text-align: center; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 8px; border: 1px solid #ccc; text-align: center; }
        .chk-btn { width: 20px; height: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div id="status" class="status-bar">📡 雲端系統連線中...</div>
        
        <div class="manual-sign">
            <input type="text" id="manual-id" placeholder="手動輸入學號..." style="padding:10px; width:200px;">
            <button onclick="manualSignIn()" style="padding:10px 20px;">簽到</button>
        </div>

        <table id="rollcall-table">
            <thead>
                <tr><th>學號</th><th>姓名</th><th>班級</th><th>07/16</th></tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        // 學生名單 (這裡填入您的完整名單)
        const students = [{"id": "11401011", "name": "李浩凱", "dept_class": "重機科一忠"}, {"id": "11401014", "name": "林士閎", "dept_class": "重機科一忠"}];
        let attendance = {}; // 格式: { "學號_日期": true }
        const today = "2026/07/16";

        function render() {
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            students.forEach(s => {
                const row = `<tr><td>${s.id}</td><td>${s.name}</td><td>${s.dept_class}</td>
                <td><input type="checkbox" class="chk-btn" ${attendance[s.id + today] ? 'checked' : ''} onchange="toggle('${s.id}')"></td></tr>`;
                body.insertAdjacentHTML('beforeend', row);
            });
        }

        function toggle(id) {
            attendance[id + today] = !attendance[id + today];
        }

        function manualSignIn() {
            const id = document.getElementById('manual-id').value.trim();
            if(students.find(s => s.id === id)) {
                attendance[id + today] = true;
                render();
            }
            document.getElementById('manual-id').value = '';
        }

        // 雲端同步邏輯
        function syncCloud() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTq4fS-2mFLfh-Ev7PTr55WNVwUpEUfXmIhMnN3M6CGZEkBQ96u5Fke4_8U3UNIOBqAC2shIfAQfaOL/pub?output=csv";
            fetch(url)
                .then(r => r.text())
                .then(csv => {
                    csv.split('\n').forEach(line => {
                        students.forEach(s => {
                            if(line.includes(s.id)) attendance[s.id + today] = true;
                        });
                    });
                    render();
                    document.getElementById('status').innerText = "✅ 雲端同步最新狀態已更新";
                })
                .catch(() => { document.getElementById('status').innerText = "⚠️ 雲端暫無法連線，可繼續手動簽到"; });
        }

        setInterval(syncCloud, 5000);
        render();
        syncCloud();
    </script>
</body>
</html>
